{% extends 'base.html' %}
{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="panel">
      <div style="text-align:center;margin-bottom:1.5rem">
        <div style="font-size:2rem;margin-bottom:0.5rem">⚡</div>
        <h1 style="margin:0;font-size:1.5rem;font-weight:700">Choose a new password</h1>
        <p class="subtle" style="margin:0.35rem 0 0;font-size:0.88rem">Use at least 10 characters.</p>
      </div>

      <form method="post" class="form-grid" data-disable-on-submit>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label style="grid-column:1/-1">
          New password
          <input type="password" name="password" autocomplete="new-password" required minlength="10" autofocus>
        </label>
        <label style="grid-column:1/-1">
          Confirm password
          <input type="password" name="password2" autocomplete="new-password" required minlength="10">
        </label>
        <button type="submit" class="btn primary" style="grid-column:1/-1;justify-content:center;padding:0.7rem">Update password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
