{% extends 'base.html' %}
{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="panel">
      <div style="text-align:center;margin-bottom:1.5rem">
        <div style="font-size:2rem;margin-bottom:0.5rem">⚡</div>
        <h1 style="margin:0;font-size:1.5rem;font-weight:700">Reset password</h1>
        <p class="subtle" style="margin:0.35rem 0 0;font-size:0.88rem">Enter your username or email address.</p>
      </div>

      <form method="post" class="form-grid" data-disable-on-submit>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label style="grid-column:1/-1">
          Username or email
          <input type="text" name="identifier" autocomplete="username" required autofocus>
        </label>
        <button type="submit" class="btn primary" style="grid-column:1/-1;justify-content:center;padding:0.7rem">Send reset link</button>
      </form>

      <p style="text-align:center;margin:1rem 0 0;font-size:0.88rem;color:var(--muted)">
        Remembered it? <a href="{{ url_for('main.login') }}">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
