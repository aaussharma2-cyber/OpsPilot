services:
  - type: web
    name: opspilot
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      # Auto-generated secrets — Render creates these once and keeps them stable.
      - key: SECRET_KEY
        generateValue: true
      - key: CREDENTIAL_ENCRYPTION_KEY
        generateValue: true

      # Supabase connection string — paste from Supabase dashboard → Settings → Database.
      # Use the "Session pooler" URI (port 5432) for best SQLAlchemy compatibility.
      # Format: postgresql://postgres.[ref]:[password]@aws-0-[region].pooler.supabase.com:5432/postgres
      - key: DATABASE_URL
        sync: false

      # Set your admin login credentials.
      - key: DEMO_USERNAME
        value: admin
      - key: DEMO_PASSWORD
        sync: false

      # Render serves over HTTPS — keep this true.
      - key: SESSION_COOKIE_SECURE
        value: "true"

      # Optional: Shopify integration
      - key: SHOPIFY_API_VERSION
        value: "2026-04"
      # - key: SHOPIFY_API_KEY
      #   sync: false
      # - key: SHOPIFY_API_SECRET
      #   sync: false
      # - key: SHOPIFY_REDIRECT_URI
      #   sync: false
      # - key: PUBLIC_BASE_URL
      #   sync: false
